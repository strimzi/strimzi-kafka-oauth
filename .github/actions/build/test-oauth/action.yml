name: "Run OAuth testsuite"
description: "Run OAuth testsuite"

inputs:
  okpSupport:
    description: "Whether to build and test with optional OKP support enabled"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Restore Maven cache
      uses: actions/cache/restore@v5
      with:
        path: ~/.m2/repository
        key: maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-

#    # TODO - Is that needed?
    - name: Build & Test Java
      shell: bash
      run: mvn -e -V -B install -DskipTests ${{ inputs.okpSupport == 'true' && '-Pokp-support' || '' }}
      env:
        BUILD_REASON: ${{ github.event_name }}
        BRANCH: ${{ github.ref }}
        TESTCONTAINERS_RYUK_DISABLED: "TRUE"
        TESTCONTAINERS_CHECKS_DISABLE: "TRUE"

    - name: Test Docker Examples
      shell: bash
      run: mvn -e -V -B clean install -f examples/docker --no-transfer-progress

    - name: Test Spring Example
      shell: bash
      run: |
        cd examples/docker
        ./spring/test-spring.sh

    - name: Modify /etc/hosts for tests
      shell: bash
      run: |
        echo "127.0.0.1 keycloak" | sudo tee -a /etc/hosts
        echo "127.0.0.1 hydra" | sudo tee -a /etc/hosts
        echo "127.0.0.1 hydra-jwt" | sudo tee -a /etc/hosts
        echo "127.0.0.1 kafka" | sudo tee -a /etc/hosts
        echo "127.0.0.1 mockoauth" | sudo tee -a /etc/hosts
        echo "127.0.0.1 kerberos" | sudo tee -a /etc/hosts
        echo "Modified /etc/hosts:"
        cat /etc/hosts

    - name: Install Docker Compose
      shell: bash
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Testsuite Compile & Spotbugs
      shell: bash
      run: mvn -e -V -B test-compile spotbugs:check -f testsuite

    - name: Run Testsuite
      if: ${{ inputs.okpSupport != 'true' }}
      shell: bash
      run: mvn -e -V -B install -f testsuite --no-transfer-progress

    - name: Build OKP-enabled testsuite dependencies
      if: ${{ inputs.okpSupport == 'true' }}
      shell: bash
      run: mvn -e -V -B install -f testsuite -pl common,mock-oauth-server,docker -am -Pokp-support --no-transfer-progress

    - name: Run mockoauth tests with OKP support
      if: ${{ inputs.okpSupport == 'true' }}
      shell: bash
      run: mvn -e -V -B install -f testsuite -pl mockoauth-tests,keycloak-auth-tests -Pokp-support -Dgroups=io.strimzi.testsuite.oauth.common.OKPTestGroup --no-transfer-progress

    - name: Publish test results
      uses: dorny/test-reporter@v2
      if: always()
      with:
        name: 'Integration Tests'
        path: '**/TEST-*.xml'
        reporter: java-junit
        fail-on-error: false