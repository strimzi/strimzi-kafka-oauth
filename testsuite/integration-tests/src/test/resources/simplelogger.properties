# Consolidated logging configuration for integration tests
# File logging enabled for debugging purposes
org.slf4j.simpleLogger.logFile=target/test.log
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss:SSS

# Kafka logging - keep quiet to reduce noise
org.slf4j.simpleLogger.log.org.apache.kafka=OFF
org.slf4j.simpleLogger.log.org.apache.kafka.common.security=TRACE

# Strimzi OAuth logging - TRACE level required by jdk17 KeycloakAuthorizerIT
# (tests assert on TRACE-level "Response body" log messages from HttpUtil)
org.slf4j.simpleLogger.log.io.strimzi=TRACE

